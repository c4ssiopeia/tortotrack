name: tortotrack
description: "Weight tracking app with Hacker's Diet trend line."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # Database
  drift: ^2.0.0
  sqlite3: ^2.0.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.0.0
  path: ^1.8.0

  # Settings
  shared_preferences: ^2.0.0

  # Chart
  fl_chart: ^0.70.0

  # Export
  file_picker: ^8.0.0
  pdf: ^3.10.0
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
