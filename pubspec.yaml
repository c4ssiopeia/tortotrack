name: tortotrack
description: "Weight tracking app with Hacker's Diet trend line."
publish_to: 'none'
version: 0.5.4+11

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # Database
  sqflite: ^2.0.0
  path_provider: ^2.0.0
  path: ^1.8.0

  # Settings
  shared_preferences: ^2.0.0

  # Chart
  fl_chart: ^0.70.0

  # Export / Import
  file_picker: ^10.3.10
  sqflite_common_ffi: ^2.3.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# path_provider_android 2.3.x pulls in the experimental `jni` Dart package
# which crashes on some Android devices at native startup.
#
# shared_preferences_android 2.4.x switched to AndroidX DataStore which bundles
# libdatastore_shared_counter.so — a native library that crashes on some devices.
# 2.3.4 is the last version without DataStore and satisfies shared_preferences ^2.3.4.
dependency_overrides:
  path_provider_android: ">=2.2.0 <2.3.0"
  shared_preferences_android: ">=2.3.4 <2.4.0"

flutter:
  uses-material-design: true
